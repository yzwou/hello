<body>
<div class="page">
	<div class="main-title">
		<h1 class="title-main">Minecraft 整合站</h1>

	</div>
<div class="content card-animate parallax-card">
	<h1>下载 Minecraft 并启动</h1>
    <div class="buttons">
        <button data-url="https://mcstart.work/download/" style="padding: 10px 40%;">启动器介绍&下载站</button>
    </div>
	<br>
	<p style="font-size: 20px">以下大部分为 Windows 版本启动器</p>

		<button data-url="https://hmcl.huangyuhui.net/download/" data-message="建议选择开发版下载">HMCL 启动器</button>
		<button data-url="https://bbsmc.net/software/pcl">PCL2 启动器</button>
        <button data-url="https://gitee.com/pcl-community/PCL2-CE/releases">PCL CE（PCL 社区版）</button>
		<button data-url="https://atlauncher.com/downloads">ALauncher 启动器</button>

	<p style="font-size: 20px">模组（整合包）</p>
	<div class="buttons">
		<button data-url='https://www.curseforge.com/minecraft/search?class=mc-mods'>Curseforge 模组下载</button>

		<button data-url='https://modrinth.com/modpacks'>Modrinth 整合包下载</button>
		<button data-url='https://bbsmc.net/mods'>BBSMC 模组下载</button>
		<button data-url='https://bbsmc.net/modpacks'>BBSMC 整合包下载</button>
		<button data-url='https://www.mcmod.cn/modlist.html'>MC 百科 Mod 检索</button>
		<button data-url='https://www.mcmod.cn/modpack.html'>MC 百科 整合包检索</button>
	</div><br>

	<p style="font-size: 20px">光影</p>
	<div class="buttons">
		<button data-url='https://www.curseforge.com/minecraft/search?class=shaders'>Curseforge 光影下载</button>
		<button data-url='https://modrinth.com/shaders'>Modrinth 光影下载</button>

    <div class="buttons">

		<button data-url='https://s.team/'>Steam</button>
	</div>
</div>


<form id="search_mcserver" class="card-animate parallax-card">
    <h2 style="margin-bottom: 15px;">Minecraft 服务器状态查询</h2>

    <label for="server_ip">服务器地址：</label><br>
    <input
            id="server_ip"
            type="text"
            placeholder="示例：mc.hypixel.net 或 127.0.0.1"
            style="width: 90%; height: 50px; font-size: 18px; margin: 10px 0;">

    <div class="form-row">
        <label for="server_type">版本：</label>
        <select id="server_type">
            <option value="java">Java 版</option>
            <option value="bedrock">基岩版</option>
        </select>
    </div>

    <div class="form-row">
        <label for="server_port">端口：</label>
        <input
                id="server_port"
                type="number"
                placeholder="Java 可留空基岩默认 19132"
                style="width: 200px;">
    </div>

    <button type="button" class="other-button" id="query_server_btn">
        查询
    </button>
</form>

<div id="mcserver_background" class="sr_background" style="display:none;">
    <div id="mcserver_result"></div>
</div>

<form id="search_box-cfm" class="card-animate parallax-card">
	<h2 style="margin-bottom: 10px;">快速搜索</h2>
	<label for="search_cfm">关键词：</label>
	<input id="search_cfm" maxlength="500" name="message" placeholder="输入名称或关键字">
	<br><br>
	<div class="form-row">
		<label for="category">类型：</label>
		<select id="category">
			<option value="all">全部</option>
			<option value="mod">模组 (Mods)</option>
			<option value="shader">光影 (Shaders)</option>
			<option value="resourcepack">资源包 (Resource Packs)</option>
		</select>
	</div>
	<div class="form-row">
		<label for="version">版本：</label>
		<select id="version">
			<option value="">不限</option>
		</select>
	</div>
	<div class="form-row">
		<label for="loader">加载器：</label>
		<select id="loader">
			<option value="">不限</option>
			<option value="fabric">Fabric</option>
			<option value="forge">Forge</option>
			<option value="quilt">Quilt</option>
			<option value="neoforge">NeoForge</option>
		</select>
	</div>
	<div class="form-row">
		<label for="source">下载源：</label>
		<select id="source">
			<option value="all">全部</option>
			<option value="curseforge">CurseForge</option>
			<option value="modrinth">Modrinth</option>
		</select>
	</div>

	<div>
		<button type="button" class="other-button" id="search_button">提交</button>
	</div>
</form>


<div id="result_cfm"></div>
